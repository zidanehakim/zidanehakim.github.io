<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRETEXT Showcase v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#e5e5e5;padding:28px;font-size:13px}
h2{font-size:1.3em;font-weight:700;color:#fff;margin-bottom:4px}
.sub{color:#666;font-size:0.85em;margin-bottom:20px}
.label{font-size:0.7em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:10px}

.preview{background:#06060f;border-radius:12px;border:1px solid #1a1a2e;overflow:hidden;position:relative;height:420px;margin-bottom:14px}
canvas{position:absolute;inset:0;width:100%;height:100%}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.scan-wrap{position:relative;display:inline-block}
.scan-ghost{font-size:2em;font-weight:800;color:#0d0d20;letter-spacing:-.02em;white-space:nowrap}
.scan-reveal{position:absolute;inset:0;overflow:hidden;white-space:nowrap;animation:rev 5s ease-in-out infinite}
@keyframes rev{0%{width:0;opacity:0}10%{opacity:1}55%{width:100%}80%{width:100%;opacity:1}95%,100%{width:0;opacity:0}}
.scan-reveal span{font-size:2em;font-weight:800;color:#e8e8ff;letter-spacing:-.02em}
.beam{position:absolute;top:-8px;bottom:-8px;width:2px;background:linear-gradient(to bottom,transparent,#7c3aed,#a855f7,#7c3aed,transparent);box-shadow:0 0 16px #7c3aed,0 0 40px #7c3aed55;animation:sb 5s ease-in-out infinite}
@keyframes sb{0%{left:0;opacity:0}6%{opacity:1}56%{left:100%;opacity:1}65%{opacity:0;left:100%}100%{left:0;opacity:0}}

.corner{position:absolute;font-family:monospace;font-size:.65em;color:#1e1e38;line-height:1.1;z-index:2}
.corner.tl{top:14px;left:16px}
.corner.tr{top:14px;right:16px;text-align:right}
.corner.bl{bottom:14px;left:16px}
.corner.br{bottom:14px;right:16px;text-align:right}
.lottie-hint{position:absolute;top:12px;right:50%;transform:translateX(50%);font-size:.58em;font-family:monospace;color:#1e1e38;border:1px dashed #1e1e38;padding:2px 8px;border-radius:20px;z-index:2}
</style>
</head>
<body>
<h2>PRETEXT Showcase — v4: asymmetric · minimal · branded</h2>
<p class="sub">3 nodes only. Deliberately off-balance. Just the brand: who you are — nothing more.</p>

<div class="label">Live preview</div>
<div class="preview">
  <canvas id="c"></canvas>

  <div class="corner tl">┌──<br>│</div>
  <div class="corner tr">──┐<br>│</div>
  <div class="corner bl">│<br>└──</div>
  <div class="corner br">│<br>──┘</div>
  <div class="lottie-hint">✦ lottie</div>

  <div class="overlay">
    <div class="scan-wrap">
      <div class="scan-ghost">Yazidane Hakim</div>
      <div class="scan-reveal"><span>Yazidane Hakim</span></div>
      <div class="beam"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const par = canvas.parentElement;
  function resize(){ canvas.width = par.clientWidth; canvas.height = par.clientHeight; }
  resize();
  window.addEventListener('resize', resize);
  const ctx = canvas.getContext('2d');

  // 3 nodes — asymmetric angles + radii, labels sized to avoid overlap
  // Angles deliberately NOT evenly spaced
  const nodes = [
    { label: 'Full-stack Dev',      angle: -105, r: 130, delay: 0.0 },
    { label: 'Software Engineer',   angle:   28, r: 150, delay: 0.4 },
    { label: 'Student',             angle:  145, r: 105, delay: 0.8 },
  ];

  let t = 0;

  function draw(){
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    const scale = Math.min(W, H) / 420;

    nodes.forEach((n, i) => {
      const age  = Math.max(0, t - n.delay * 3);
      const op   = Math.min(1, age * 0.4);
      if (op <= 0) return;

      const rad  = (n.angle * Math.PI) / 180;
      const r    = n.r * scale;
      const nx   = cx + Math.cos(rad) * r;
      const ny   = cy + Math.sin(rad) * r;
      const pulse = Math.sin(t * 1.3 + i * 1.1) * 0.5 + 0.5;

      // dashed edge
      ctx.save();
      ctx.globalAlpha = (0.1 + pulse * 0.12) * op;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny);
      ctx.strokeStyle = '#7c3aed';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // glow halo
      const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, 22 * scale);
      g.addColorStop(0, `rgba(124,58,237,${0.2 * op})`);
      g.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(nx, ny, 22 * scale, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();

      // dot
      ctx.beginPath();
      ctx.arc(nx, ny, (3.5 + pulse * 1.8) * scale, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(167,139,250,${0.75 + pulse * 0.25})`;
      ctx.fill();

      // label — pushed outward from center, no sub-label
      const dx = nx - cx, dy = ny - cy;
      const dl = Math.sqrt(dx * dx + dy * dy);
      const lx = nx + (dx / dl) * 22 * scale;
      const ly = ny + (dy / dl) * 22 * scale;

      ctx.save();
      ctx.globalAlpha = op;
      ctx.font = `bold ${Math.round(10 * scale)}px monospace`;
      ctx.fillStyle = '#c4b5fd';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, lx, ly);
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</body>
</html>
